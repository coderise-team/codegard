services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codegard_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - codegard_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload --reload-dir django_app
    environment:
      DJANGO_SETTINGS_MODULE: settings.dev
      PYTHONPATH: /app/django_app:/shared
    volumes:
      - ./shared:/shared
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codegard_net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
        - action: sync
          path: ./shared
          target: /shared
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock

  celery-worker:
    build:
      context: ./backend
      target: dev
    command: celery -A config worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: settings.dev
      PYTHONPATH: /app/django_app:/shared
    volumes:
      - ./shared:/shared
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codegard_net
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock

  celery-beat:
    build:
      context: ./backend
      target: dev
    command: celery -A config beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: settings.dev
      PYTHONPATH: /app/django_app:/shared
    volumes:
      - ./shared:/shared
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codegard_net
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock

  backend-test:
    build:
      context: ./backend
      target: test
    command: run-tests
    profiles:
      - test
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PYTHONPATH: /app/django_app:/shared
      DJANGO_SETTINGS_MODULE: settings.test
    volumes:
      - ./backend:/app
      - ./shared:/shared
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codegard_net

  judge:
    build:
      context: ./judge
      target: web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    environment:
      PYTHONPATH: /shared
    volumes:
      - ./shared:/shared
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    ports:
      - "8001:8001"
    networks:
      - codegard_net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8001), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    develop:
      watch:
        - action: sync
          path: ./judge
          target: /app
        - action: sync
          path: ./shared
          target: /shared
        - action: rebuild
          path: ./judge/pyproject.toml
        - action: rebuild
          path: ./judge/uv.lock

  judge-test:
    build:
      context: ./judge
      target: test
    command: run-tests
    profiles:
      - test
    environment:
      PYTHONPATH: /shared
    volumes:
      - ./shared:/shared
    env_file: .env
    networks:
      - codegard_net

networks:
  codegard_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data: