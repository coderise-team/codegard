services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codegard_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - codegard_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    command: python django_app/manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: settings.dev
    volumes:
      - ./backend:/app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - codegard_net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-test:
    build:
      context: ./backend
      target: test
    command: run-tests
    profiles:
      - test
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codegard_net

  judge:
    build:
      context: ./judge
      target: web
    command: uvicorn judge_app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./judge:/app
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    ports:
      - "8001:8001"
    networks:
      - codegard_net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8001), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s



  judge-test:
    build:
      context: ./judge
      target: test
    command: run-tests
    profiles:
      - test
    volumes:
      - ./judge:/app
    env_file: .env
    networks:
      - codegard_net

networks:
  codegard_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
