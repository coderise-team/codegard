services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codegard_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - codegard_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: web
    command: gunicorn -k uvicorn.workers.UvicornWorker config.asgi:application --bind 0.0.0.0:8000 --workers 4
    environment:
      DJANGO_SETTINGS_MODULE: settings.prod
      PYTHONPATH: /shared
    volumes:
      - ./shared:/shared
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codegard_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  judge:
    build:
      context: ./judge
      target: web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2
    environment:
      PYTHONPATH: /shared
    env_file: .env
    volumes:
      - ./shared:/shared
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - codegard_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8001), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      judge:
        condition: service_healthy
    networks:
      - codegard_net
    restart: unless-stopped

  databasus:
    image: databasus/databasus:latest
    container_name: databasus
    ports:
      - "4005:4005"
    volumes:
      - ./data/databasus-data:/databasus-data
    networks:
      - codegard_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  codegard_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
